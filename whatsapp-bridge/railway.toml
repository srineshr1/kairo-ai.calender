[railway]
  plugin = "node"

[build]
  builder = "NIXPACKS"

[deploy]
  numInstances = 1
  restartPolicyType = "ON_FAILURE"
  restartPolicyMaxRetries = 10

[[env]]
  name = "NODE_ENV"
  value = "production"

[[env]]
  name = "BRIDGE_PORT"
  value = "3001"

[[env]]
  name = "ALLOWED_ORIGINS"
  value = "https://kairocalender.web.app"

[[env]]
  name = "CALENDAR_URL"
  value = "https://kairocalender.web.app"

[[env]]
  name = "GROQ_API_KEY"
  value = ""

[[env]]
  name = "BRIDGE_ADMIN_API_KEY"
  value = "kairo-bridge-admin-2024"
